<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cart</title>
<style>
body{background:#0b0b12;color:#fff;font-family:Arial;padding:20px}
.item{margin-bottom:20px;background:#111;padding:10px;border-radius:10px}
</style>
</head>
<body>

<h2>Корзина</h2>
<div id="list"></div>

<script>
let cart=JSON.parse(localStorage.getItem('cart')||'[]')
let list=document.getElementById('list')

function render(){
list.innerHTML=''
let sum=0
cart.forEach(i=>{
sum+=i.price*i.qty
list.innerHTML+=`
<div class="item">
<img src="${i.image}" width="80">
<p>${i.name}</p>
<p>${i.size}</p>
<p>${i.price} ₽</p>
<button onclick="remove(${i.id})">Удалить</button>
</div>`
})
list.innerHTML+=`<h3>Итого: ${sum} ₽</h3>`
}

function remove(id){
cart=cart.filter(i=>i.id!==id)
localStorage.setItem('cart',JSON.stringify(cart))
render()
}

render()
</script>

</body>
</html>
