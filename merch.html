<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#06070b">
<title>BLOCK812 Merch</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#07080d;
  --panel:rgba(12,16,28,.78);
  --line:rgba(255,255,255,.10);
  --text:#f5f7fb;
  --red:#ff4040;
  --pink:#ff57d8;
  --cyan:#77f0ff;
}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px;
  margin:16px;
  border-radius:30px;
  background:rgba(6,10,18,.9);
  border:1px solid var(--line);
}

.header-actions{
  display:flex;
  gap:12px;
}

.icon-link{
  width:48px;
  height:48px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);
}

/* HEART */
.icon-heart{
  width:22px;
  height:22px;
  filter:
    drop-shadow(0 0 6px rgba(255,87,216,.3))
    drop-shadow(0 0 10px rgba(119,240,255,.2));
}

/* COUNT */
.count{
  position:absolute;
  top:-6px;
  right:-6px;
  background:linear-gradient(135deg,var(--red),var(--pink));
  border-radius:50%;
  font-size:12px;
  padding:3px 6px;
}

/* CATEGORY */
.categories{
  display:flex;
  gap:12px;
  padding:0 16px;
}

.cat-btn{
  padding:10px 16px;
  border-radius:999px;
  border:1px solid var(--line);
  cursor:pointer;
}

.cat-btn.active{
  background:linear-gradient(90deg,var(--red),var(--pink),var(--cyan));
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:20px;
  padding:16px;
  position:relative;
}

/* FAVORITE BTN */
.fav-btn{
  position:absolute;
  top:10px;
  right:10px;
}

/* SIZE */
.size{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.size button{
  padding:6px 10px;
  border-radius:999px;
  border:1px solid var(--line);
}

.size button.active{
  background:var(--pink);
}
</style>
</head>

<body>

<header class="header">
  <div>BLOCK812</div>

  <div class="header-actions">

    <a class="icon-link" href="favorites.html">
      <svg class="icon-heart" viewBox="0 0 24 24" fill="none">
        <path d="M12 21s-6.7-4.35-9.33-8C.7 10.5 2.5 6 6.5 6c2.04 0 3.5 1.5 3.5 1.5S11.46 6 13.5 6C17.5 6 19.3 10.5 21.33 13c-2.63 3.65-9.33 8-9.33 8Z"
        stroke="url(#g)" stroke-width="1.8"/>
        <defs>
          <linearGradient id="g">
            <stop stop-color="#FF4040"/>
            <stop offset="0.5" stop-color="#FF57D8"/>
            <stop offset="1" stop-color="#77F0FF"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="count" id="fav-count">0</span>
    </a>

    <a class="icon-link" href="cart.html">🛒</a>

  </div>
</header>

<div class="categories">
  <button class="cat-btn active">Футболки</button>
  <button class="cat-btn">Худи</button>
  <button class="cat-btn">Зипки</button>
</div>

<h2 style="padding:16px;">Коллекция BLOCK812</h2>

<div class="grid">

<div class="card" data-name="ВАЗ 2105" data-price="3500">
<button class="fav-btn" onclick="toggleFavorite(this)">♡</button>

<h3>ВАЗ 2105</h3>

<div class="size">
<button onclick="selectSize(this)">S</button>
<button onclick="selectSize(this)">M</button>
<button onclick="selectSize(this)">L</button>
</div>

</div>

</div>

<script>
function getFav(){return JSON.parse(localStorage.getItem('fav')||'[]')}
function saveFav(f){localStorage.setItem('fav',JSON.stringify(f))}

function selectSize(btn){
btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'))
btn.classList.add('active')
}

function toggleFavorite(btn){
const card=btn.closest('.card')
const name=card.dataset.name

const sizeBtn=card.querySelector('.active')
if(!sizeBtn){alert('Выбери размер');return}

const size=sizeBtn.textContent

let fav=getFav()
const exists=fav.find(i=>i.name===name&&i.size===size)

if(exists){
fav=fav.filter(i=>!(i.name===name&&i.size===size))
btn.textContent='♡'
}else{
fav.push({name,size})
btn.textContent='♥'
}

saveFav(fav)
update()
}

function update(){
document.getElementById('fav-count').textContent=getFav().length
}

update()
</script>

</body>
</html>
