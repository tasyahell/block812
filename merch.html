<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLOCK812 Merch</title>
<style>
body{margin:0;background:#0b0b12;color:#fff;font-family:Arial}
.container{padding:20px}
.merch-grid{display:grid;gap:20px}
.merch-card{background:#111;border-radius:20px;padding:16px}
img{width:100%;border-radius:12px}
.btn{margin-top:10px;padding:10px;border:none;border-radius:999px;background:#ff4d6d;color:#fff}
.size-chip{display:inline-block;margin:4px;padding:6px 10px;background:#222;border-radius:999px;cursor:pointer}
.size-chip.active{background:#ff4d6d}
.buy-popup{display:none}
.buy-panel.active .buy-popup{display:block}
.merch-desc-hidden{display:none;margin-top:10px;color:#aaa}
.merch-card.open .merch-desc-hidden{display:block}
</style>
</head>
<body>
<div class="container">
<h2>Каталог</h2>

<div class="merch-grid">

<!-- CARD -->
<div class="merch-card">
<div onclick="toggleDetailsFromImage(this)">
<img src="vaz2105-0 2.PNG">
</div>
<h3>ВАЗ 2105</h3>
<p>3500 ₽</p>

<div class="merch-desc-hidden">
Описание товара
</div>

<div class="buy-panel">
<button class="btn" onclick="toggleBuyPanel(this,event)">Купить</button>

<div class="buy-popup">
<div>
<span class="size-chip" onclick="selectSize(this,event)">S</span>
<span class="size-chip" onclick="selectSize(this,event)">M</span>
<span class="size-chip" onclick="selectSize(this,event)">L</span>
</div>

<button onclick="toggleDetails(this,event)">Подробнее</button>

<button onclick="addToCart(this,event,'ВАЗ 2105',3500,'vaz2105-0 2.PNG')">В корзину</button>
<button onclick="addToCartAndContinue(this,event)">Продолжить покупки</button>

</div>
</div>
</div>

</div>
</div>

<script>
function toggleBuyPanel(btn,e){e.stopPropagation();btn.closest('.buy-panel').classList.toggle('active')}
function toggleDetails(btn,e){e.stopPropagation();btn.closest('.merch-card').classList.toggle('open')}
function toggleDetailsFromImage(el){el.closest('.merch-card').classList.toggle('open')}
function selectSize(btn,e){e.stopPropagation();let g=btn.parentNode;g.querySelectorAll('.size-chip').forEach(x=>x.classList.remove('active'));btn.classList.add('active')}

function addToCart(btn,e,name,price,image){
e.stopPropagation()
let card=btn.closest('.merch-card')
let size=card.querySelector('.size-chip.active')
if(!size){alert('Выбери размер');return}
let cart=JSON.parse(localStorage.getItem('cart')||'[]')
cart.push({id:Date.now(),name,price,image,size:size.textContent,qty:1})
localStorage.setItem('cart',JSON.stringify(cart))
window.location='cart.html'
}

function addToCartAndContinue(btn,e){
e.stopPropagation()
let card=btn.closest('.merch-card')
let size=card.querySelector('.size-chip.active')
if(!size){alert('Выбери размер');return}
let name=card.querySelector('h3').textContent
let price=3500
let image=card.querySelector('img').src
let cart=JSON.parse(localStorage.getItem('cart')||'[]')
cart.push({id:Date.now(),name,price,image,size:size.textContent,qty:1})
localStorage.setItem('cart',JSON.stringify(cart))
btn.closest('.buy-panel').classList.remove('active')
alert('Добавлено')
}
</script>
</body>
</html>
