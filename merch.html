<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLOCK812 Merch</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b12;
  color:white;
}

.container{
  padding:20px;
}

.merch-grid{
  display:grid;
  gap:20px;
}

.merch-card{
  background:#111;
  border-radius:20px;
  padding:16px;
  box-shadow:0 0 40px rgba(255,0,150,.1);
}

.merch-card img{
  width:100%;
  border-radius:16px;
}

.merch-card h3{
  margin:10px 0 5px;
}

.price{
  color:#ff5fd0;
}

.btn{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:999px;
  background:linear-gradient(90deg,#ff4d6d,#c77dff);
  color:white;
  cursor:pointer;
}

.size-row{
  margin-top:10px;
}

.size-chip{
  display:inline-block;
  padding:6px 12px;
  margin:4px;
  border-radius:999px;
  background:#222;
  cursor:pointer;
}

.size-chip.active{
  background:#ff4d6d;
}
</style>
</head>

<body>

<div class="container">

<h2>Каталог</h2>

<div class="merch-grid">

<div class="merch-card">
<img src="vaz2105-1 2.PNG">
<h3>ВАЗ 2105</h3>
<div class="price">3 500 ₽</div>

<button class="btn">Купить</button>

<div class="size-row">
<span class="size-chip">S</span>
<span class="size-chip">M</span>
<span class="size-chip">L</span>
<span class="size-chip">XL</span>
</div>
</div>

<div class="merch-card">
<img src="vaz2102-0 2.PNG">
<h3>ВАЗ 2102</h3>
<div class="price">3 500 ₽</div>

<button class="btn">Купить</button>

<div class="size-row">
<span class="size-chip">S</span>
<span class="size-chip">M</span>
<span class="size-chip">L</span>
<span class="size-chip">XL</span>
</div>
</div>

<div class="merch-card">
<img src="vaz2101-0 2.PNG">
<h3>ВАЗ 2101</h3>
<div class="price">3 500 ₽</div>

<button class="btn">Купить</button>

<div class="size-row">
<span class="size-chip">S</span>
<span class="size-chip">M</span>
<span class="size-chip">L</span>
<span class="size-chip">XL</span>
</div>
</div>

</div>

</div>

</body>
</html>
